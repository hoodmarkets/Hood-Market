name: QA
on:
  workflow_call:
  workflow_dispatch:
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  lint:
    name: Format Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
      - uses: ./.github/actions/setup
      - name: Check formatting
        run: forge fmt --check

  build:
    name: Build & Test
    needs: lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
      - uses: ./.github/actions/setup
      - name: Build
        run: forge build
      - name: Run tests
        run: forge test -vvv
        env:
          BASE_RPC_URL: ${{ secrets.RPC_URL }}
